services:
  robtic-system:
    image: ghcr.io/robticorg/robtic-system:latest
    build: .
    restart: unless-stopped
    env_file:
      - /home/robtic/robtic-system/.env

  robtic-api:
    image: ghcr.io/robticorg/robtic-api:latest
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file:
      - /home/robtic/robtic-system/.env
    ports:
      - "127.0.0.1:3001:3001"

  robtic-activity:
    image: ghcr.io/robticorg/robtic-activity:latest
    build:
      context: .
      dockerfile: apps/activity/Dockerfile
      args:
        VITE_DISCORD_CLIENT_ID: ${VITE_DISCORD_CLIENT_ID:-}
    restart: unless-stopped
    depends_on:
      - robtic-api
    ports:
      - "127.0.0.1:8080:80"
