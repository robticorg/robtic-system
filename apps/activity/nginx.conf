server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Discord strips the /.proxy prefix before forwarding, so token-exchange
    # requests arrive here as /api/* and are handed to the api container on the
    # shared compose network. One public URL mapping ("/") covers the whole app.
    location /api/ {
        proxy_pass http://robtic-api:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri /index.html;
    }
}
