name: Deploy Bot

on:
  push:
    branches: [ main ]
jobs:
  deploy:
    runs-on: self-hosted

    environment:
      name: Robtic Server
      url: https://core.robtic.org

    steps:
      - name: Notify Deployment Start
        run: |
          ACTOR="${{ github.actor }}"
          REPO="${{ github.repository }}"
          BRANCH="${{ github.ref_name }}"
          COMMIT="${{ github.event.head_commit.message }}"
          AVATAR="https://github.com/${{ github.actor }}.png"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          curl -H "Content-Type: application/json" \
          -d "{
            \"username\": \"Robtic Deploy\",
            \"embeds\": [{
              \"title\": \"🚀 Deployment Started\",
              \"url\": \"$RUN_URL\",
              \"color\": 16753920,
              \"author\": {
                \"name\": \"$ACTOR\",
                \"icon_url\": \"$AVATAR\",
                \"url\": \"https://github.com/$ACTOR\"
              },
              \"fields\": [
                {\"name\": \"📦 Repository\", \"value\": \"$REPO\", \"inline\": true},
                {\"name\": \"🌿 Branch\", \"value\": \"$BRANCH\", \"inline\": true},
                {\"name\": \"🖥 Server\", \"value\": \"core.robtic.org\", \"inline\": true},
                {\"name\": \"📝 Commit\", \"value\": \"$COMMIT\", \"inline\": false}
              ],
              \"footer\": {\"text\": \"Robtic Deployment Pipeline\"},
              \"timestamp\": \"$TIMESTAMP\"
            }]
          }" \
          "${{ secrets.DISCORD_WEBHOOK_DEPLOY }}"

      - name: Deploy locally on self-hosted runner
        run: |
          flock -n /tmp/robtic-deploy.lock bash -c '
            cd /home/robtic/robtic-system
            git fetch origin
            git reset --hard origin/main
            git pull origin main
            chmod +x ./scripts/deploy.sh
            ./scripts/deploy.sh
          '

      - name: Notify Deployment Success
        if: success()
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          curl -H "Content-Type: application/json" \
          -d "{
            \"username\": \"Robtic Deploy\",
            \"embeds\": [{
              \"title\": \"🟢 Deployment Successful\",
              \"url\": \"$RUN_URL\",
              \"description\": \"The bot has been successfully deployed to **core.robtic.org**.\",
              \"color\": 5763719,
              \"footer\": {\"text\": \"Robtic Deployment Pipeline\"},
              \"timestamp\": \"$TIMESTAMP\"
            }]
          }" \
          "${{ secrets.DISCORD_WEBHOOK_DEPLOY }}"

      - name: Notify Deployment Failure
        if: failure()
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          curl -H "Content-Type: application/json" \
          -d "{
            \"username\": \"Robtic Deploy\",
            \"embeds\": [{
              \"title\": \"🔴 Deployment Failed\",
              \"url\": \"$RUN_URL\",
              \"description\": \"Deployment failed. Check the GitHub Actions logs.\",
              \"color\": 15548997,
              \"footer\": {\"text\": \"Robtic Deployment Pipeline\"},
              \"timestamp\": \"$TIMESTAMP\"
            }]
          }" \
          "${{ secrets.DISCORD_WEBHOOK_DEPLOY }}"